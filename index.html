<html lang="ja">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #bg-layer {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #ffffff;
      z-index: 0;
      pointer-events: none;
    }
    .site-header {
      background: #ff8c00;
      color: #fff;
      padding: 16px;
    }
    .site-main {
      padding: 16px;
      line-height: 1.8;
    }
    .site-footer {
      padding: 16px;
      background: #f0f0f0;
      font-size: 12px;
    }
    #chat-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(4px);
    }
    #chatbox {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatHeader {
      background: #ff8c00;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    #chatHeader .backBtn {
      cursor: pointer;
      font-size: 18px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }
    .user {
      background: #d1f0d1;
      align-self: flex-end;
    }
    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }
    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    #userInput {
      flex: 1;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    #userInput:focus {
      outline: none;  
    }
    #micBtn,
    #sendBtn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #ff8c00;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #micBtn.recording {
      color: #ff5252;
      position: relative;
    }
    #micBtn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      #chatbox {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
<div id="bg-layer">

    <h2 data-i18n="access">アクセス</h2>
    <p data-i18n="accessDetails">高崎駅から徒歩3分</p>
  </main>
  <footer class="site-footer">
    <span data-i18n="copyright">© Central Hotel Group</span>
  </footer>
</div>
<div id="chat-layer">
<div id="chatbox">
  <div id="chatHeader">
    <span class="backBtn" title="公式サイトへ戻る">◀</span>
    <div data-i18n="chatHeaderText">
      矢印クリックで公式サイトへ..<br>
      セントラルホテル高崎Q&Aチャットです<br>
      質問は直接入力、スマホ音声入力対応！
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="">
    <button id="micBtn">🎤</button>
    <button id="sendBtn" data-i18n="send">送信</button>
  </div>
</div>
</div>

});

    e.key === "F12"

    e.preventDefault();
  }
});

};

function findAnswer(query){
  query = query.toLowerCase();
  const detectedLang = i18next.language || 'ja';
  const baseLang = detectedLang.split('-')[0];
  const lang = faq[detectedLang] ? detectedLang : (faq[baseLang] ? baseLang : 'ja');
  const faqList = faq[lang];
  for(const item of faqList){
    for(const kw of item.keywords){
      if(query.includes(kw.toLowerCase())) return item.answer;
    }
  }
  return i18next.t('noAnswer');
}
const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
function addBotMessageTypewriter(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  const timer = setInterval(()=>{
    div.textContent += text.charAt(i++);
    messages.scrollTop = messages.scrollHeight;
    if(i >= text.length) clearInterval(timer);
  }, 25);
}
function addMessage(msg, isUser=false){
  if(isUser){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }else{
    addBotMessageTypewriter(msg);
  }
}
sendBtn.onclick = () => {
  const msg = userInput.value.trim();
  if(!msg) return;
  addMessage(msg, true);
  setTimeout(()=>addMessage(findAnswer(msg)), 100);
  userInput.value = "";
};
userInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});
let recognition = null;
let isRecording = false;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "●";
  };
  recognition.onend = recognition.onerror = ()=>{
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  };
  recognition.onresult = e=>{
    userInput.value = e.results[0][0].transcript;
    sendBtn.click();
  };
}
function startVoice(){
  const ua = navigator.userAgent;
  if(ua.includes("Edg/")){
    alert("Edgeでは音声入力は利用できません。\nChrome または Safari をご利用ください。");
    return;
  }
  if(!recognition){
    alert("このブラウザでは音声入力に対応していません。");
    return;
  }
  if(isRecording) return;
  try{ recognition.start(); }catch(e){}
}
micBtn.onclick = startVoice;
micBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  startVoice();
});

}
["click","keydown","mousemove","scroll","pointerdown"].forEach(ev=>{
