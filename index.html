  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #bg-layer {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #ffffff;
      z-index: 0;
      pointer-events: none;
    }
    .site-header {
      background: #ff8c00;
      color: #fff;
      padding: 16px;
    }
    .site-main {
      padding: 16px;
      line-height: 1.8;
    }
    .site-footer {
      padding: 16px;
      background: #f0f0f0;
      font-size: 12px;
    }
    #chat-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(4px);
    }
    #chatbox {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatHeader {
      background: #ff8c00;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    #chatHeader .backBtn {
      cursor: pointer;
      font-size: 18px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }
    .user {
      background: #d1f0d1;
      align-self: flex-end;
    }
    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }
    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    #userInput {
      flex: 1;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    #userInput:focus {
      outline: none;  
    }
    #micBtn,
    #sendBtn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #ff8c00;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #micBtn.recording {
      color: #ff5252;
      position: relative;
    }
    #micBtn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      #chatbox {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>

  </main>
  <footer class="site-footer">
    <span data-i18n="copyright">© Central Hotel Group</span>
  </footer>
</div>
<div id="chat-layer">
<div id="chatbox">

    <span class="backBtn" title="公式サイトへ戻る">◀</span>

      セントラルホテル高崎Q&Aチャットです<br>
      質問は直接入力、スマホ音声入力対応！
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="">
    <button id="micBtn">🎤</button>
    <button id="sendBtn" data-i18n="send">送信</button>
  </div>
</div>
</div>

  en: [
   {keywords:["check-in","check in","checkin"], answer:"Check-in begins at 3:00 PM."},

  {keywords:["check-out","check out","checkout","overcharge","extension"], answer:"Check-out time is 10:00 AM. If you wish to extend your stay, please contact the Front Desk in advance by pressing the 'A' button. Additional charges may apply."},

  {keywords:["breakfast"], answer:"Breakfast is served from 6:30 AM to 9:00 AM. Please visit the restaurant on the 1st floor."},

  {keywords:["wake-up call"], answer:"To set a wake-up call, please lift the receiver, press the 'B' button, and enter a four-digit time. (Example: For 8:15 AM, please enter 0815.)"},

  {keywords:["valuables"], answer:"We recommend depositing your valuables in the safe at the Front Desk and receiving a receipt. Please note that the hotel cannot be held responsible for valuables not deposited with the Front Desk."},

  {keywords:["air conditioning","air conditioner","cooling","heating"], answer:"The air conditioning can be adjusted using the control switch located beside your bed."},

  {keywords:["front desk","call front"], answer:"For assistance, please press the 'A' button to contact the Front Desk."},

  {keywords:["room key"], answer:"When leaving your room, please ensure the door is securely locked. We kindly ask that you leave your room key at the Front Desk when going out."},

  {keywords:["evacuation route","evacuation","fire"], answer:"An evacuation route map is posted on the inside of your room door. Please review it for your safety."},

  {keywords:["ventilation","unit bath","bathroom"], answer:"The bathroom ventilation fan operates 24 hours a day to ensure proper air circulation."},

  {keywords:["laundry","washing"], answer:"Please report any loss, damage, or dissatisfaction with laundry service within 24 hours after delivery. In the case of compensation, liability will be limited to a maximum of ten times the laundry fee. Laundry service requests are accepted at the Front Desk on the 2nd floor. For inquiries, please press 'A' to contact the Front Desk. *Please note that laundry service is unavailable on Sundays and public holidays."},

  {keywords:["room","cleaning","housekeeping"], answer:"Housekeeping requests are accepted from 10:00 AM to 1:00 PM. If you do not require cleaning or would like to change the cleaning time, please contact the Front Desk by pressing 'A'. Remaining beverages and items in the trash bin will be disposed of. (If there are items that should not be discarded, please leave a note for our staff.)"},

  {keywords:["tea","hot water"], answer:"Please use the tea server or electric kettle provided in your room."},

  {keywords:["hair dryer","hairdryer"], answer:"A hair dryer is available in the closet."},

  {keywords:["refrigerator"], answer:"The refrigerator is located under the desk. (Please note that it does not have a freezer function.)"},

  {keywords:["vending machine"], answer:"Vending machines are located on the 5th and 9th floors."},

  {keywords:["coin","coinlaundry"], answer:"A coin-operated laundry is available next to the vending machines on the 9th floor."},

  {keywords:["microwave"], answer:"A microwave oven is available next to the vending machines on the 9th floor."},

  {keywords:["ice machine","ice"], answer:"An ice machine is available next to the vending machines on the 5th floor."},

  {keywords:["pants press"], answer:"Pants pressers are available next to the elevators on each floor. They are also available for loan at the Front Desk."},

  {keywords:["wifi","wi-fi","lan","internet","wired internet"], answer:"Complimentary Wi-Fi is available in all guest rooms. Wired LAN internet access is available in the lobby on the 2nd floor."},

  {keywords:["newspaper"], answer:"Newspapers are available for reading and purchase in the lobby on the 2nd floor."},

  {keywords:["massage","transportation information","timetable"], answer:"For massage arrangements, transportation information, or train timetables, please contact the Front Desk by pressing 'A'."},

  {keywords:["copy","fax"], answer:"Copy and fax services are available at the Front Desk on the 2nd floor for an additional charge. Please ask the staff for assistance."},

  {keywords:["rental"], answer:"The following items are available for loan: desk lamps, mobile phone chargers, irons, ironing boards, hangers, blankets, wired LAN cables, sewing kits, pants pressers, nail clippers, thermometers, bottle openers, wine openers, forks, spoons, plates, and humidifiers."},

  {keywords:["amenities"], answer:"Additional amenities available include combs, razors, hair brushes, cotton swabs, soap, body sponges, basic skincare products, disposable chopsticks, bath additives, train timetables from Takasaki Station, and a nearby restaurant map."},

  {keywords:["room service"], answer:"Room service is not available."},

  {keywords:["nightwear","slippers"], answer:"We kindly ask guests not to wear nightwear or slippers in the lobby or restaurant."},

  {keywords:["telephone","outside line","extension"], answer:"The telephone provides direct dialing for local, domestic, and international calls. To call another guest room, please dial the room number (example: dial 701 for Room 701). For local or domestic calls, press the 'D' button, wait for the dial tone, and then dial the number. For international calls, press 'D', then dial 010 followed by the country code, area code, and phone number."}

  zh: [

  {keywords:["wifi","无线网络","互联网","LAN"], answer:"所有客房均提供免费Wi-Fi。若需要有线网络，请在2楼大厅使用。"},

  {keywords:["盥洗用品","備品","amenities"], answer:"櫃檯提供以下備品：梳子、刮鬍刀、髮刷、棉花棒、香皂、沐浴海綿、基礎保養品、免洗筷、入浴劑、高崎站出發列車時刻表以及附近餐廳地圖。"},

  {keywords:["貴重物品"], answer:"貴重物品請寄存於前台保險箱並領取收據。未寄存在前台的貴重物品，如有遺失或損壞，本酒店恕不負責，敬請見諒。"},

  {keywords:["洗衣","洗衣服務","laundry"], answer:"如對洗衣服務有遺失、損壞或任何不滿意之處，請於送回後24小時內通知前台。若需賠償，最高賠償金額為洗衣費用的10倍。洗衣服務於2樓前台受理。如需查詢，請按「A」鍵聯絡前台。※星期日及公眾假期暫停服務。"},

  {keywords:["房間清潔","清潔","打掃"], answer:"房間清潔申請時間為上午10:00至下午1:00。如不需要清潔或需更改時間，請按「A」鍵聯絡前台。未飲完的飲料及垃圾桶內的垃圾將會被清理。（如有不可丟棄的物品，請留下備註說明。）"},

  vi: [
    {keywords:["nhận phòng","check-in"], answer:"Thời gian nhận phòng bắt đầu từ 15:00."},

  {keywords:["trả phòng","gia hạn","phụ phí"], answer:"Thời gian trả phòng là 10:00 sáng. Nếu quý khách muốn gia hạn thời gian trả phòng, vui lòng liên hệ quầy lễ tân trước bằng cách nhấn nút 'A'. Có thể phát sinh phụ phí."},

  {keywords:["bữa sáng","ăn sáng"], answer:"Bữa sáng được phục vụ từ 6:30 đến 9:00 sáng. Vui lòng đến nhà hàng ở tầng 1."},

  {keywords:["báo thức","đánh thức"], answer:"Vui lòng nhấc ống nghe điện thoại, nhấn nút 'B' và nhập 4 chữ số thời gian. (Ví dụ: nếu muốn báo thức lúc 8:15, hãy nhập 0815.)"},

  {keywords:["đồ có giá trị","tài sản"], answer:"Vui lòng gửi các đồ vật có giá trị vào két an toàn tại quầy lễ tân và nhận phiếu gửi. Khách sạn không chịu trách nhiệm đối với các sự cố xảy ra với đồ vật không gửi tại quầy lễ tân."},

  {keywords:["điều hòa","máy lạnh","sưởi"], answer:"Quý khách có thể điều chỉnh điều hòa bằng công tắc đặt cạnh đầu giường."},

  {keywords:["lễ tân","gọi lễ tân"], answer:"Để liên hệ quầy lễ tân, vui lòng nhấn nút 'A'."},

  {keywords:["chìa khóa phòng","thẻ phòng"], answer:"Khi ra ngoài, vui lòng đảm bảo cửa phòng đã được khóa. Xin vui lòng gửi chìa khóa phòng tại quầy lễ tân."},

  {keywords:["thoát hiểm","hỏa hoạn","sơ tán"], answer:"Sơ đồ lối thoát hiểm được dán ở mặt trong cửa phòng. Vui lòng kiểm tra trước để đảm bảo an toàn."},

  {keywords:["thông gió","phòng tắm"], answer:"Quạt thông gió trong phòng tắm hoạt động 24 giờ để đảm bảo lưu thông không khí."},

  {keywords:["giặt là","giặt đồ","laundry"], answer:"Nếu có mất mát, hư hỏng hoặc không hài lòng với dịch vụ giặt là, vui lòng thông báo trong vòng 24 giờ sau khi nhận lại đồ. Trong trường hợp bồi thường, mức bồi thường tối đa là gấp 10 lần phí giặt. Dịch vụ giặt là được tiếp nhận tại quầy lễ tân tầng 2. Để liên hệ, vui lòng nhấn nút 'A'. *Lưu ý: dịch vụ này không hoạt động vào Chủ Nhật và ngày lễ."},

  {keywords:["dọn phòng","vệ sinh phòng","lau phòng"], answer:"Yêu cầu dọn phòng được tiếp nhận từ 10:00 sáng đến 1:00 chiều. Nếu không cần dọn phòng hoặc muốn thay đổi thời gian, vui lòng nhấn 'A' để liên hệ quầy lễ tân. Đồ uống còn lại và rác trong thùng rác sẽ được dọn bỏ. (Nếu có vật không được vứt bỏ, vui lòng để lại ghi chú.)"},

  {keywords:["trà","nước nóng"], answer:"Vui lòng sử dụng bộ pha trà hoặc ấm đun nước điện được trang bị trong phòng."},

  {keywords:["máy sấy tóc"], answer:"Máy sấy tóc được đặt trong tủ quần áo."},

  {keywords:["tủ lạnh"], answer:"Tủ lạnh nằm dưới bàn làm việc. (Không có chức năng đông lạnh.)"},

  {keywords:["máy bán hàng tự động"], answer:"Máy bán hàng tự động được đặt tại tầng 5 và tầng 9."},

  {keywords:["giặt xu","máy giặt tự động"], answer:"Máy giặt tự phục vụ bằng xu được đặt cạnh khu vực máy bán hàng tự động tại tầng 9."},

  {keywords:["lò vi sóng"], answer:"Lò vi sóng được đặt cạnh khu vực máy bán hàng tự động tại tầng 9."},

  {keywords:["máy làm đá","đá"], answer:"Máy làm đá được đặt cạnh khu vực máy bán hàng tự động tại tầng 5."},

  {keywords:["bàn ép quần"], answer:"Bàn ép quần được đặt cạnh thang máy ở mỗi tầng. (Quầy lễ tân cũng có cho mượn.)"},

  {keywords:["wifi","internet","mạng"], answer:"Wi-Fi miễn phí được cung cấp trong tất cả các phòng. Nếu cần kết nối mạng LAN có dây, vui lòng sử dụng tại sảnh tầng 2."},

  {keywords:["báo"], answer:"Báo có sẵn để đọc hoặc mua tại sảnh tầng 2."},

  {keywords:["massage","thông tin giao thông","lịch tàu"], answer:"Để đặt dịch vụ massage, hỏi thông tin giao thông hoặc lịch tàu, vui lòng nhấn 'A' để liên hệ quầy lễ tân."},

  {keywords:["sao chép","fax","photocopy"], answer:"Dịch vụ photocopy và fax có sẵn tại quầy lễ tân tầng 2 với một khoản phí. Vui lòng liên hệ nhân viên nếu quý khách cần sử dụng."},

  {keywords:["cho mượn"], answer:"Các vật dụng cho mượn gồm có: đèn bàn, bộ sạc điện thoại, bàn ủi, bàn ủi quần áo, móc treo quần áo, chăn, cáp LAN có dây, bộ kim chỉ, bàn ép quần, bấm móng tay, nhiệt kế, đồ mở nắp chai, đồ mở rượu vang, nĩa, muỗng, đĩa và máy tạo độ ẩm."},

  {keywords:["đồ dùng","tiện nghi","amenities"], answer:"Các tiện nghi có sẵn gồm: lược, dao cạo râu, bàn chải tóc, tăm bông, xà phòng, bọt biển tắm, sản phẩm chăm sóc da cơ bản, đũa dùng một lần, muối tắm, bảng giờ tàu xuất phát từ ga Takasaki và bản đồ nhà hàng gần khách sạn."},

  {keywords:["dịch vụ phòng","room service"], answer:"Khách sạn không cung cấp dịch vụ ăn uống tại phòng."},

  {keywords:["đồ ngủ","dép"], answer:"Xin vui lòng không mặc đồ ngủ hoặc đi dép khi di chuyển trong khu vực sảnh hoặc nhà hàng."},

  {keywords:["điện thoại","gọi ngoài","gọi nội bộ"], answer:"Điện thoại trong phòng có thể gọi trực tiếp nội hạt, liên tỉnh và quốc tế. Để gọi phòng khác, vui lòng nhập số phòng (ví dụ: gọi phòng 701 thì bấm 701). Khi gọi nội hạt hoặc liên tỉnh, nhấn nút 'D', chờ tín hiệu quay số rồi nhập số điện thoại. Khi gọi quốc tế, nhấn 'D', sau đó nhập 010 + mã quốc gia + mã vùng + số điện thoại."}

  ],
  th: [
    {keywords:["เช็คอิน","check-in"], answer:"สามารถเช็คอินได้ตั้งแต่เวลา 15:00 น."},

  {keywords:["เช็คเอาท์","ขยายเวลา","ค่าบริการเพิ่ม"], answer:"เวลาเช็คเอาท์คือ 10:00 น. หากต้องการขยายเวลาเช็คเอาท์ กรุณาติดต่อแผนกต้อนรับล่วงหน้าโดยกดปุ่ม 'A' อาจมีค่าบริการเพิ่มเติม."},

  {keywords:["อาหารเช้า"], answer:"ให้บริการอาหารเช้าตั้งแต่เวลา 6:30 น. ถึง 9:00 น. กรุณาไปที่ห้องอาหารชั้น 1."},

  {keywords:["ปลุก","มอร์นิ่งคอล"], answer:"กรุณายกหูโทรศัพท์ กดปุ่ม 'B' แล้วใส่ตัวเลข 4 หลักของเวลา (ตัวอย่าง: หากต้องการปลุกเวลา 8:15 ให้กด 0815)"},

  {keywords:["ของมีค่า"], answer:"กรุณาฝากของมีค่าไว้ในตู้เซฟที่แผนกต้อนรับและรับใบรับฝากไว้ ทางโรงแรมไม่สามารถรับผิดชอบต่อความเสียหายหรือการสูญหายของทรัพย์สินที่ไม่ได้ฝากไว้กับแผนกต้อนรับ."},

  {keywords:["แอร์","เครื่องปรับอากาศ","ความเย็น","ความร้อน"], answer:"สามารถปรับเครื่องปรับอากาศได้ที่สวิตช์ควบคุมบริเวณหัวเตียง."},

  {keywords:["แผนกต้อนรับ","ติดต่อฟรอนต์"], answer:"หากต้องการติดต่อแผนกต้อนรับ กรุณากดปุ่ม 'A'."},

  {keywords:["กุญแจห้อง","คีย์การ์ด"], answer:"เมื่อออกจากห้อง กรุณาตรวจสอบให้แน่ใจว่าประตูล็อกเรียบร้อย และกรุณาฝากกุญแจห้องไว้ที่แผนกต้อนรับ."},

  {keywords:["ทางหนีไฟ","อพยพ","ไฟไหม้"], answer:"แผนผังเส้นทางหนีไฟติดอยู่ด้านในของประตูห้อง กรุณาตรวจสอบล่วงหน้าเพื่อความปลอดภัย."},

  {keywords:["ระบายอากาศ","ห้องน้ำ"], answer:"พัดลมระบายอากาศในห้องน้ำทำงานตลอด 24 ชั่วโมงเพื่อให้มีการถ่ายเทอากาศ."},

function findAnswer(query){
  query = query.toLowerCase();
  const detectedLang = i18next.language || 'ja';
  const baseLang = detectedLang.split('-')[0];
  const lang = faq[detectedLang] ? detectedLang : (faq[baseLang] ? baseLang : 'ja');
  const faqList = faq[lang];
  for(const item of faqList){
    for(const kw of item.keywords){
      if(query.includes(kw.toLowerCase())) return item.answer;
    }
  }
  return i18next.t('noAnswer');
}
const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
function addBotMessageTypewriter(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  const timer = setInterval(()=>{
    div.textContent += text.charAt(i++);
    messages.scrollTop = messages.scrollHeight;
    if(i >= text.length) clearInterval(timer);
  }, 25);
}
function addMessage(msg, isUser=false){
  if(isUser){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }else{
    addBotMessageTypewriter(msg);
  }
}
sendBtn.onclick = () => {
  const msg = userInput.value.trim();
  if(!msg) return;
  addMessage(msg, true);
  setTimeout(()=>addMessage(findAnswer(msg)), 100);
  userInput.value = "";
};
userInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});
let recognition = null;
let isRecording = false;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "●";
  };
  recognition.onend = recognition.onerror = ()=>{
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  };
  recognition.onresult = e=>{
    userInput.value = e.results[0][0].transcript;
    sendBtn.click();
  };
}
function startVoice(){
  const ua = navigator.userAgent;
  if(ua.includes("Edg/")){
    alert("Edgeでは音声入力は利用できません。\nChrome または Safari をご利用ください。");
    return;
  }
  if(!recognition){
    alert("このブラウザでは音声入力に対応していません。");
    return;
  }
  if(isRecording) return;
  try{ recognition.start(); }catch(e){}
}
micBtn.onclick = startVoice;
micBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  startVoice();
});

["click","keydown","mousemove","scroll","pointerdown"].forEach(ev=>{
